name: CSQAQ Collect

on:
  workflow_dispatch:
    inputs:
      text:
        description: '饰品名称'
        required: false
        default: ''
      goods_id:
        description: '饰品ID（有则跳过search）'
        required: false
        default: ''
      token_index:
        description: 'Token索引'
        required: true
        default: '0'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collect
        env:
          CSQAQ_TOKENS: ${{ secrets.CSQAQ_TOKENS }}
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_GOODS_ID: ${{ github.event.inputs.goods_id }}
          INPUT_TOKEN_INDEX: ${{ github.event.inputs.token_index }}
        run: python collect.py --text "$INPUT_TEXT" --goods-id "$INPUT_GOODS_ID" --token-index "$INPUT_TOKEN_INDEX"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.json
